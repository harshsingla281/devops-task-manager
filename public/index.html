<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      width: 350px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f7f7f7;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .delete-btn {
      background: #e53e3e;
      padding: 5px 10px;
    }

    .delete-btn:hover {
      background: #c53030;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🚀 Task Manager</h2>

  <div class="input-group">
    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
async function addTask() {
  const task = document.getElementById("taskInput").value;

  await fetch("/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ task })
  });

  document.getElementById("taskInput").value = "";
  loadTasks();
}

async function deleteTask(index) {
  await fetch(`/tasks/${index}`, { method: "DELETE" });
  loadTasks();
}

async function loadTasks() {
  const res = await fetch("/tasks");
  const data = await res.json();

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  data.forEach((t, i) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${t}
      <button class="delete-btn" onclick="deleteTask(${i})">Delete</button>
    `;
    list.appendChild(li);
  });
}

loadTasks();
</script>

</body>
</html>
