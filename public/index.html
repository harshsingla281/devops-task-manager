<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    .container {
      margin: 50px auto;
      width: 300px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      width: 70%;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    li {
      margin: 10px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Task Manager</h2>

  <input id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
async function addTask() {
  const task = document.getElementById("taskInput").value;

  await fetch("/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ task })
  });

  loadTasks();
}

async function loadTasks() {
  const res = await fetch("/tasks");
  const data = await res.json();

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  data.forEach(t => {
    const li = document.createElement("li");
    li.innerText = t;
    list.appendChild(li);
  });
}

loadTasks();
</script>

</body>
</html>
